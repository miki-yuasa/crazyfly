# Reference: https://github.com/DLR-RM/rl-baselines3-zoo/blob/master/hyperparams/ppo.yml#L32
seed: 42

n_timesteps: !!float 1e9
policy: 'MlpPolicy'
n_steps: 600
batch_size: 2048
gae_lambda: 0.95
gamma: 0.999
n_epochs: 10
ent_coef: 0.01
learning_rate: !!float 1e-4
clip_range: !!float 0.2
policy_kwargs:
  activation_fn: 'nn.Tanh'
  net_arch: [256, 256]
  squash_output: False
vf_coef: 0.5
target_kl: 0.01
max_grad_norm: 0.5
device: "cuda:0"